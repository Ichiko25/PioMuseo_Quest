<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Museo ni Dr. Pío Valenzuela</title>
    <link rel="icon" type="image/png" href="web-images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --accent-primary: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #020617;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(249, 115, 22, 0.1) 0%, transparent 50%);
            z-index: 0;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        .logo-wrapper img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background: white;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .google-btn {
            background: white;
            color: #0f172a;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 115, 22, 0.2);
            background: #f8fafc;
        }

        #login-error {
            margin-top: 20px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            color: #f87171;
            font-size: 13px;
            display: none;
            text-align: left;
            line-height: 1.4;
        }

        .footer-text {
            margin-top: 32px;
            font-size: 12px;
            color: #475569;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-wrapper">
            <img src="web-images/qqq.jpg" alt="Museum Logo">
        </div>
        <h1><i class="fas fa-shield-halved" style="color: var(--accent-primary); margin-right: 10px;"></i>Portal Access</h1>
        <p>Welcome to the digital portal of Dr. Pío Valenzuela. Please sign in with your Google account to explore the museum content.</p>
        
        <button class="google-btn" onclick="startLogin()">
            <i class="fab fa-google" style="color: #4285F4;"></i>
            Sign in with Google
        </button>

        <div id="login-error"></div>

        <div class="footer-text">
            &copy; 2026 Museo ni Dr. Pío Valenzuela. <br>
            All rights reserved.
        </div>
    </div>

    <script>
        async function startLogin() {
            const errorEl = document.getElementById('login-error');
            if (errorEl) errorEl.style.display = 'none';

            // 1. Env Check
            if (window.location.protocol === 'file:') {
                if (errorEl) {
                    errorEl.innerHTML = "<strong>Error:</strong> Google Login requires a web server. Please use <em>Live Server</em> in VS Code.";
                    errorEl.style.display = 'block';
                }
                return;
            }

            // 2. Client Check
            if (!window.supabaseClient) {
                if (errorEl) {
                    errorEl.innerHTML = "<strong>System Error:</strong> Supabase Client could not be initialized. Please check your internet or configuration.";
                    errorEl.style.display = 'block';
                }
                return;
            }

            console.log("Starting OAuth redirect...");
            try {
                const { error } = await window.supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/index.html'
                    }
                });

                if (error) throw error;
            } catch (err) {
                console.error("Login failed:", err);
                if (errorEl) {
                    errorEl.innerHTML = "<strong>Sign In Failed:</strong> " + err.message;
                    errorEl.style.display = 'block';
                }
            }
        }

        // Auto-redirect if already logged in
        async function checkSession() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();
    </script>
</body>
</html>
