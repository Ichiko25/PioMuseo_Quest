<!DOCTYPE html>
<html>
<head>
  <title>Supabase Test</title>
</head>
<body>

<h1>Testing Supabase...</h1>

<!-- ✅ Correct Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
  // Wait until everything is loaded
  window.onload = async function () {

const SUPABASE_URL = 'https://brsoehxzpqhzgnsqivrq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pg9IZUYCihI7NiaS0NDHxQ_i7WqmCv6';

async function test() {
    console.log("Fetching all content rows...");
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/content?select=*&limit=5`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        const data = await res.json();
        console.log("Status:", res.status);
        if (!res.ok) {
            console.log("Error:", data);
        } else {
            console.log("Data (first 5 rows):", data);
        }
    } catch (e) {
        console.log("Fetch error:", e);
    }
}
test();

  };
</script>

</body>
</html>
